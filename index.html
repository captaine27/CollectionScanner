          content="#1976D2">

          content="Ma Collection - Scanner de codes-barres">

    <div class="container">

        <header>

        <!-- Zone caméra -->

        <section class="card">

    <video

        autoplay

</div>

                Appuyez sur Scanner pour commencer.
            </p>

        </section>


        <!-- Pied de page -->

        <footer>

            Version 1.15

        </footer>
